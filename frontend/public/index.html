<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOTI AI</title>

  <style>
@keyframes pulse {
  0% {
    transform: scale(1);
    opacity: 0.9;
  }

  50% {
    transform: scale(1.06);
    opacity: 1;
  }

  100% {
    transform: scale(1);
    opacity: 0.9;
  }
}
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #05050d;
      overflow: hidden;
    }

    * {
      box-sizing: border-box;
    }

    input, button {
      font-size: 16px;
    }

    button {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
